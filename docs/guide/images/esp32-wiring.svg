<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="500" rx="12" fill="#f7f8fa" stroke="#d0d5dd"/>
  <text x="24" y="36" font-size="21" font-weight="bold" fill="#111">ESP32 replacement wiring (auto-direction RS-485 module)</text>
  <text x="24" y="60" font-size="14" fill="#475467">TTL side: RX, TX, VCC, GND. Bus side: A, B, GND. No DE pin (the module handles direction).</text>

  <!-- ESP32 -->
  <rect x="40" y="120" width="190" height="235" rx="10" fill="#1f6feb" stroke="#0b4bbf"/>
  <text x="135" y="148" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">ESP32</text>
  <g font-size="14" fill="#fff" text-anchor="end">
    <text x="222" y="182">GPIO19 (TX)</text>
    <text x="222" y="222">GPIO18 (RX)</text>
    <text x="222" y="262">3V3</text>
    <text x="222" y="302">5V / VIN</text>
    <text x="222" y="342">GND</text>
  </g>

  <!-- RS-485 module -->
  <rect x="340" y="120" width="210" height="235" rx="10" fill="#334155" stroke="#1e293b"/>
  <text x="445" y="146" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">RS-485 module</text>
  <text x="445" y="164" font-size="11" fill="#cbd5e1" text-anchor="middle">TTL ↔ RS-485, auto-direction</text>
  <g font-size="14" fill="#fff">
    <text x="356" y="186">RXD</text>
    <text x="356" y="226">TXD</text>
    <text x="356" y="266">VCC</text>
    <text x="356" y="342">GND</text>
  </g>
  <g font-size="14" fill="#fff" text-anchor="end">
    <text x="534" y="202">A</text>
    <text x="534" y="242">B</text>
    <text x="534" y="342">GND</text>
  </g>

  <!-- A/C connector -->
  <rect x="650" y="150" width="180" height="180" rx="10" fill="#0f9d58" stroke="#0a7a44"/>
  <text x="740" y="178" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">A/C 4-pin</text>
  <g font-size="14" fill="#fff" text-anchor="middle">
    <text x="740" y="206">A</text>
    <text x="740" y="246">B</text>
    <text x="740" y="286">5 V</text>
    <text x="740" y="318">GND</text>
  </g>

  <!-- TTL wires ESP32 <-> module -->
  <g stroke-width="3" fill="none">
    <path d="M230,178 H340" stroke="#e3b341"/>            <!-- TX -> RXD -->
    <path d="M340,218 H230" stroke="#3fb950"/>            <!-- TXD -> RX -->
    <path d="M230,258 H340" stroke="#f85149"/>            <!-- 3V3 -> VCC -->
    <path d="M230,338 H340" stroke="#8b949e"/>            <!-- GND -->
  </g>
  <text x="285" y="172" font-size="11" fill="#8a6d1a" text-anchor="middle">data</text>

  <!-- bus wires module <-> A/C -->
  <g stroke-width="3" fill="none">
    <path d="M550,198 H650 V202" stroke="#111"/>          <!-- A -->
    <path d="M550,238 H620 V242 H650" stroke="#111"/>     <!-- B -->
    <path d="M550,338 H620 V314 H650" stroke="#8b949e"/>  <!-- GND -->
  </g>

  <!-- 5V power: A/C 5V -> ESP32 VIN (U-route along bottom) -->
  <path d="M650,286 H600 V378 H135 V355" stroke="#f0883e" stroke-width="3" fill="none"/>
  <circle cx="135" cy="355" r="0"/>
  <path d="M135,355 V302 H230" stroke="#f0883e" stroke-width="3" fill="none"/>
  <text x="380" y="396" font-size="12" fill="#8a5300">5 V from the A/C powers the ESP32 (VIN); the ESP32's 3V3 powers the module.</text>

  <!-- notes -->
  <text x="24" y="432" font-size="13" fill="#334155">No data? Swap RXD/TXD (module labeling varies by vendor).</text>
  <text x="24" y="452" font-size="12.5" font-weight="bold" fill="#8a5300">⚠ Never use GPIO16/17 for UART (PSRAM pins).  ⚠ Bench: connect only A/B first (ground-loop brownout).</text>
  <text x="24" y="472" font-size="11.5" fill="#667085">The repo's MAX3485 build drives DE on GPIO4; with an auto-direction module that toggle is a harmless no-op.</text>
</svg>
