# Publish the documentation to GitHub Pages so it is INDEXABLE.
#
# The wiki is not. GitHub serves every /wiki/ URL with `X-Robots-Tag: none` (noindex, nofollow at
# the HTTP level), so no wiki page can appear in Google, Bing, or the crawlers behind AI search.
# Pages sites carry no such header. This workflow assembles the docs that already exist -- in the
# repo and in the wiki -- into one Jekyll site, rather than forking the content into a second copy
# that would drift.
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - docs-site/**
      - firmware/docs/**
      - reverse-engineering/docs/**
      - README.md
      - .github/workflows/pages.yaml
      - .github/scripts/assemble_docs_site.py   # the assembler IS the build; changing it must rebuild
  gollum:            # fires when a wiki page is edited, so wiki edits reach the indexable site
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Public wiki, so no token needed. Failure here must not sink the whole site: the repo docs
      # are the larger half and should still publish.
      - name: Fetch the wiki
        continue-on-error: true
        run: git clone --depth 1 https://github.com/${{ github.repository }}.wiki.git wiki-src

      - name: Assemble the site
        run: |
          python3 .github/scripts/assemble_docs_site.py

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_site_src
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
