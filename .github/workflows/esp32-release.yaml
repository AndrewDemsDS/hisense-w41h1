name: ESP32 firmware release

# Builds the ESP32 Matter firmware on an `esp32-vX.Y.Z` tag and attaches the images to the GitHub
# Release. Runs on the same self-hosted `sdk-builder` runner as the AmebaZ2 build, reusing its
# already-installed ESP-IDF + esp-matter (a cold esp-matter bootstrap in a hosted container is slow
# and fragile). The runner must export two paths in its service env (~/actions-runner/.env), so no
# personal paths live in this public workflow:
#   IDF_EXPORT        = <esp-idf>/export.sh   (the IDF that matches versions.env IDF_PIN)
#   ESP_MATTER_EXPORT = <esp-matter>/export.sh
#
# SECURITY (public repo): tag-push only + the github.repository guard, so fork PRs can't reach the
# self-hosted runner. stage/flash stay manual.
on:
  push:
    tags: ['esp32-v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'AndrewDemsDS/hisense-w41h1' && github.event_name == 'push'
    runs-on: [self-hosted, sdk-builder]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Tag must match CMake PROJECT_VER
        run: |
          tag_ver="${GITHUB_REF_NAME#esp32-v}"
          cmake_ver=$(sed -n 's/^set(PROJECT_VER "\(.*\)").*/\1/p' firmware/esp32-matter/CMakeLists.txt)
          echo "tag=$tag_ver  CMakeLists PROJECT_VER=$cmake_ver"
          if [ "$tag_ver" != "$cmake_ver" ]; then
            echo "::error::tag esp32-v$tag_ver != PROJECT_VER $cmake_ver -- bump CMakeLists.txt or retag"
            exit 1
          fi

      - name: Build (reuse the runner's ESP-IDF + esp-matter)
        run: |
          : "${IDF_EXPORT:?set IDF_EXPORT on the runner to the esp-idf export.sh path}"
          : "${ESP_MATTER_EXPORT:?set ESP_MATTER_EXPORT on the runner to the esp-matter export.sh path}"
          # shellcheck disable=SC1090
          . "$IDF_EXPORT"
          # shellcheck disable=SC1090
          . "$ESP_MATTER_EXPORT"
          cd firmware/esp32-matter
          idf.py set-target esp32
          idf.py build

      - name: Collect artifacts + checksums
        run: |
          cd firmware/esp32-matter/build
          sha256sum \
            hisense_ac_matter.bin \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            ota_data_initial.bin \
            flasher_args.json > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/esp32-matter/build/hisense_ac_matter.bin
            firmware/esp32-matter/build/bootloader/bootloader.bin
            firmware/esp32-matter/build/partition_table/partition-table.bin
            firmware/esp32-matter/build/ota_data_initial.bin
            firmware/esp32-matter/build/flasher_args.json
            firmware/esp32-matter/build/SHA256SUMS.txt
