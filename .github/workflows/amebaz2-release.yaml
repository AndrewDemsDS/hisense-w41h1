name: AmebaZ2 firmware release

# On an `amebaz2-vX.Y.Z` tag: build + package the AmebaZ2 image and attach it to the GitHub Release.
# Needs the proprietary Realtek SDK, so it runs on a self-hosted runner (label `sdk-builder`) that
# has the SDK, ARM toolchain, and a filled-in ota-release.env. Set W41H1_OTA_ENV in the runner env
# to that file's path (keeps SDK/Pi secrets off GitHub). Tag-push only, so fork PRs can't reach the
# runner. stage/flash stay manual.
on:
  push:
    tags: ['amebaz2-v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, sdk-builder]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Provision build env from the runner host
        run: |
          : "${W41H1_OTA_ENV:?set W41H1_OTA_ENV on the runner to the ota-release.env path}"
          cp "$W41H1_OTA_ENV" firmware/scripts/ota-release.env

      - name: Tag must match version.txt
        run: |
          want="amebaz2-v$(tr -d '[:space:]' < firmware/src/version.txt)"
          [ "$GITHUB_REF_NAME" = "$want" ] || { echo "::error::tag $GITHUB_REF_NAME != $want"; exit 1; }

      - name: Build + package OTA
        run: |
          mkdir -p firmware/built-images   # gitignored, absent on a fresh checkout
          bash firmware/scripts/ota-release.sh build
          bash firmware/scripts/ota-release.sh package

      - name: Collect this version's artifacts + checksums
        run: |
          # built-images/ accumulates versions on a reused runner: reference exact filenames, not globs.
          V=$(bash firmware/scripts/ota-release.sh verint "$(cat firmware/src/version.txt)")
          echo "V=$V" >> "$GITHUB_ENV"
          cd firmware/built-images
          sha256sum "flash_rac-integrated-v$V.bin" "rac-v$V.ota" "rac-v$V.json" > "SHA256SUMS-v$V.txt"

      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true   # auto "What's Changed" from commits/PRs since the last tag
          files: |
            firmware/built-images/flash_rac-integrated-v${{ env.V }}.bin
            firmware/built-images/rac-v${{ env.V }}.ota
            firmware/built-images/rac-v${{ env.V }}.json
            firmware/built-images/SHA256SUMS-v${{ env.V }}.txt
